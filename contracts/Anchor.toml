[features]
seeds = true
skip-lint = false

[toolchain]
anchor_version = "0.32.1"

[programs.localnet]
terrova = "B3j3WKTsuHuBVeNbqcKX5wTyiPtnUGJ7ZpuCHctYPxwH"

[programs.devnet]
terrova = "B3j3WKTsuHuBVeNbqcKX5wTyiPtnUGJ7ZpuCHctYPxwH"

[programs.mainnet]
terrova = "B3j3WKTsuHuBVeNbqcKX5wTyiPtnUGJ7ZpuCHctYPxwH"

[registry]
url = "https://api.apr.dev"

[provider]
# Change to "devnet" when deploying: anchor deploy --provider.cluster devnet
# After deploy, update NEXT_PUBLIC_PROGRAM_ID in .env.local with the new program ID
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 15000

[test.validator]
url = "https://api.devnet.solana.com"

[[test.validator.clone]]
address = "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA"

[workspace]
members = ["programs/*"]
